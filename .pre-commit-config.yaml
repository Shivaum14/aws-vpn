repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ".*\\.md$"  # trailing whitespace is meaningful in Markdown
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key  # catches accidentally committed key material

  # ── Python ────────────────────────────────────────────────────────────────
  # ruff replaces flake8, isort, and black in one tool
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Terraform ─────────────────────────────────────────────────────────────
  # terraform_fmt runs `terraform fmt` on all .tf files. This enforces the
  # canonical HCL style (alignment, spacing) that `terraform fmt -check` also
  # verifies in CI. Using the pre-commit hook means formatting is applied
  # automatically on every commit rather than needing a separate format step.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
