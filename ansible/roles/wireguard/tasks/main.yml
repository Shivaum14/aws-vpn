---
# WireGuard installation and server configuration.
#
# Task ordering matters: packages first, then kernel settings, then
# key generation, then config rendering, then service start. Each block
# is idempotent — running this role twice produces zero changes on the
# second run.

- name: Install WireGuard and runtime dependencies
  ansible.builtin.dnf:
    name:
      - wireguard-tools  # wg, wg-quick
      - iptables         # required by PostUp/PreDown NAT rules in wg0.conf
      - awscli           # required by SSM handler to store server public key
    state: present

# ── Kernel IP forwarding ────────────────────────────────────────────────────
# WireGuard acts as a router: packets arrive on wg0 from VPN clients and must
# be forwarded to the VPC. Without ip_forward=1 the kernel drops them silently.
#
# sysctl_file writes a drop-in under /etc/sysctl.d/ so the setting persists
# across reboots without modifying the base /etc/sysctl.conf.
- name: Enable and persist IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-wireguard.conf
    sysctl_set: true
    reload: true

# ── Server key generation ───────────────────────────────────────────────────
# Keys are generated on-instance and never leave it. The private key stays in
# /etc/wireguard/privatekey (mode 600, root only). The public key is written
# to /etc/wireguard/publickey and separately pushed to SSM Parameter Store so
# the Python client tooling can read it without SSH access.
#
# `creates:` makes the shell task idempotent: if the file already exists the
# task is skipped entirely. Both keys are generated atomically in one pipeline
# to guarantee they are a matching pair.
- name: Create /etc/wireguard directory
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate WireGuard server key pair
  ansible.builtin.shell: |
    set -o pipefail
    wg genkey | tee /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
    chmod 600 /etc/wireguard/privatekey
  args:
    creates: /etc/wireguard/privatekey
    executable: /bin/bash
  notify: Push public key to SSM

- name: Read server private key
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wireguard_private_key_b64
  no_log: true

- name: Read server public key
  ansible.builtin.slurp:
    src: /etc/wireguard/publickey
  register: wireguard_public_key_b64

- name: Set server key facts
  ansible.builtin.set_fact:
    wireguard_private_key: "{{ wireguard_private_key_b64.content | b64decode | trim }}"
    wireguard_public_key: "{{ wireguard_public_key_b64.content | b64decode | trim }}"
  no_log: true

# ── Server config ───────────────────────────────────────────────────────────
# Render wg0.conf from the Jinja2 template. The template loops over wg_peers
# (a list of dicts with name/public_key/allowed_ips) to produce [Peer] blocks.
# On initial deploy wg_peers is empty — peers are added later via Python
# tooling, which re-runs this role with the peer list as an extra var.
#
# NAT masquerade is configured via PostUp/PreDown so wg-quick owns the
# iptables rules and cleans them up automatically on interface teardown.
# This is simpler and more reliable than managing iptables rules separately.
- name: Render /etc/wireguard/wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  notify: Reload WireGuard

# ── Service ─────────────────────────────────────────────────────────────────
- name: Enable and start wg-quick@{{ wg_interface }}
  ansible.builtin.service:
    name: "wg-quick@{{ wg_interface }}"
    state: started
    enabled: true
