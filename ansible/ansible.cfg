[defaults]
inventory  = inventory/hosts.ini
roles_path = roles
remote_user = ec2-user

# SSH key path is not set here — set SSH_KEY in .env (see .env.example).
# The make targets pass --private-key automatically when SSH_KEY is set.
# This keeps ansible.cfg free of user-specific paths and works cleanly across
# different operators and key naming conventions.

# Disable host key checking for ephemeral cloud instances.
#
# WHY: Every terraform destroy + apply creates a new EC2 instance with a new
# host key. If host_key_checking is enabled, Ansible will refuse to connect
# until the old key is removed from ~/.ssh/known_hosts. For a single-operator
# dev environment this is an operational nuisance with low security benefit.
#
# TRADEOFF: This disables TOFU (trust-on-first-use) protection — Ansible will
# connect to any host that presents itself at the inventory IP without
# verifying its identity. This is acceptable here because:
#   1. The IP is an Elastic IP from your own AWS account
#   2. The security group restricts SSH to your operator CIDR only
#
# ALTERNATIVE: A cleaner approach for shared environments is to run
# ssh-keyscan <EIP> and append to ~/.ssh/known_hosts after provisioning.
# The gen-inventory.sh script is the natural place to do this.
host_key_checking = False

# Pipelining reduces the number of SSH connections per task by using a
# persistent connection. Requires requiretty = False in sudoers, which is
# the default on Amazon Linux 2023. Measurably faster on playbooks with
# many tasks.
pipelining = True

[ssh_connection]
# Retry initial SSH connection up to 3 times. Useful when connecting shortly
# after terraform apply, before the instance has fully booted and started sshd.
retries = 3
